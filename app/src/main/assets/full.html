<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>梅露露</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a2e;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        #live2d-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        #live2d-canvas.ready {
            opacity: 1;
        }

        #bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: linear-gradient(160deg, #1a1a2e 0%, #16213e 55%, #0f3460 100%);
        }

        .top-buttons {
            position: fixed;
            top: 12px;
            right: 12px;
            z-index: 20;
            display: flex;
            gap: 8px;
        }

        .top-buttons button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(0,0,0,0.55);
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.85);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .top-buttons button:active {
            background: rgba(127,219,202,0.4);
        }

        .status-bar {
            position: fixed;
            top: 14px;
            left: 12px;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .affection-badge {
            background: rgba(0,0,0,0.55);
            border: 1px solid rgba(255,182,193,0.3);
            border-radius: 16px;
            padding: 6px 12px;
            color: rgba(255,182,193,0.9);
            font-size: 12px;
        }

        .mood-badge {
            background: rgba(0,0,0,0.55);
            border: 1px solid rgba(127,219,202,0.3);
            border-radius: 16px;
            padding: 6px 12px;
            color: rgba(127,219,202,0.9);
            font-size: 12px;
        }

        .weather-badge {
            background: rgba(0,0,0,0.55);
            border: 1px solid rgba(255,220,100,0.3);
            border-radius: 16px;
            padding: 6px 12px;
            color: rgba(255,220,100,0.9);
            font-size: 11px;
        }

        .speech-bubble {
            position: fixed;
            right: 5%;
            top: 25%;
            z-index: 15;
            max-width: 45%;
            min-width: 140px;
            background: rgba(255,255,255,0.95);
            color: #2a2a3e;
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.6;
            box-shadow: 0 6px 24px rgba(0,0,0,0.3);
            opacity: 0;
            pointer-events: none;
            transform: translateX(10px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .speech-bubble.show {
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            left: -10px;
            top: 30px;
            border-top: 10px solid transparent;
            border-bottom: 10px solid transparent;
            border-right: 12px solid rgba(255,255,255,0.95);
        }

        .input-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 18;
            padding: 10px 12px;
            display: flex;
            gap: 8px;
            align-items: center;
            background: rgba(0,0,0,0.6);
            transform: translateY(0);
            transition: transform 0.3s ease;
        }

        .input-bar.hidden {
            transform: translateY(110%);
        }

        .input-bar input {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 10px 16px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .input-bar input::placeholder {
            color: rgba(255,255,255,0.4);
        }

        .input-bar input:focus {
            border-color: rgba(127,219,202,0.5);
        }

        .input-bar .send {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(127,219,202,0.3);
            border: 1px solid rgba(127,219,202,0.5);
            color: white;
            font-size: 16px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .input-bar .send:active {
            background: rgba(127,219,202,0.5);
        }

        .toggle-input-btn {
            position: fixed;
            bottom: 70px;
            right: 12px;
            z-index: 19;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(127,219,202,0.85);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 50;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            overflow-y: auto;
        }

        .overlay.show {
            display: block;
        }

        .panel {
            background: #1a1a2e;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 16px;
            padding: 20px;
            max-width: 440px;
            margin: 10px auto;
        }

        .panel h2 {
            color: white;
            font-size: 18px;
            margin-bottom: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel h2 .close-x {
            cursor: pointer;
            color: rgba(255,255,255,0.5);
            font-size: 22px;
        }

        .panel h3 {
            color: rgba(127,219,202,0.85);
            font-size: 14px;
            margin-top: 16px;
            margin-bottom: 6px;
        }

        .panel label {
            display: block;
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            margin-top: 10px;
            margin-bottom: 4px;
        }

        .panel input, .panel textarea, .panel select {
            width: 100%;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            padding: 9px 12px;
            color: white;
            font-size: 13px;
            outline: none;
        }

        .panel input:focus {
            border-color: rgba(127,219,202,0.5);
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 70vh;
            overflow-y: auto;
        }

        .history-item {
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
        }

        .history-item.user {
            background: rgba(255,255,255,0.08);
            align-self: flex-end;
            max-width: 85%;
            border-radius: 12px 12px 4px 12px;
            color: rgba(255,255,255,0.85);
        }

        .history-item.meruru {
            background: rgba(127,219,202,0.12);
            align-self: flex-start;
            max-width: 85%;
            border-radius: 12px 12px 12px 4px;
            color: rgba(255,255,255,0.9);
        }

        .history-item .who {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 3px;
        }

        .btn-row {
            display: flex;
            gap: 8px;
            margin-top: 18px;
        }

        .btn-row button {
            flex: 1;
            padding: 11px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            cursor: pointer;
        }

        .btn-save {
            background: rgba(127,219,202,0.3);
            color: white;
            border: 1px solid rgba(127,219,202,0.5) !important;
        }

        .btn-cancel {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2) !important;
        }

        .btn-test {
            width: 100%;
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            background: rgba(100,180,255,0.2);
            color: rgba(150,200,255,1);
            border: 1px solid rgba(100,180,255,0.4);
            font-size: 13px;
            cursor: pointer;
        }

        .btn-danger {
            width: 100%;
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            background: rgba(255,80,80,0.18);
            color: rgba(255,150,150,1);
            border: 1px solid rgba(255,80,80,0.35);
            font-size: 13px;
            cursor: pointer;
        }

        .loading-tip {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 30;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            text-align: center;
            background: rgba(0,0,0,0.5);
            padding: 16px 24px;
            border-radius: 12px;
        }

        .loading-tip.hidden {
            display: none;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 4px;
            background: #888;
            vertical-align: middle;
        }
        .status-dot.ok { background: #7fdbca; }
        .status-dot.err { background: #ff6b6b; }

        #pet-btn {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(100, 180, 255, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        #pet-btn:hover {
            background: rgba(100, 180, 255, 0.85);
            transform: translateX(-50%) scale(1.1);
        }

        #pet-panel {
            position: fixed;
            top: 62px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9998;
            width: 260px;
            background: rgba(30, 30, 50, 0.93);
            border: 1px solid rgba(100, 180, 255, 0.4);
            border-radius: 12px;
            padding: 16px;
            color: white;
            font-size: 13px;
            display: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        #pet-panel.show { display: block; }
        #pet-panel h3 { margin: 0 0 10px 0; font-size: 15px; color: #7ecfff; text-align: center; }
        #pet-panel .pet-desc { font-size: 11px; color: #999; margin-bottom: 14px; line-height: 1.6; text-align: center; }
        #pet-panel label { display: block; margin-bottom: 4px; color: #aad4ff; font-size: 12px; }
        #pet-panel input[type="range"] { width: 100%; margin-bottom: 6px; accent-color: #7ecfff; }
        #pet-size-value { color: #fff; font-weight: bold; }
        .pet-size-labels { display: flex; justify-content: space-between; font-size: 11px; color: #666; margin-bottom: 14px; }
        #pet-download-btn { display: block; width: 100%; padding: 11px; margin-top: 10px; background: linear-gradient(135deg, #4a9eff, #7c5cff); border: none; border-radius: 8px; color: white; font-size: 14px; font-weight: bold; cursor: pointer; text-align: center; text-decoration: none; transition: all 0.3s; }
        #pet-download-btn:hover { transform: scale(1.03); box-shadow: 0 4px 15px rgba(100, 150, 255, 0.4); }
        .pet-note { font-size: 10px; color: #666; margin-top: 8px; text-align: center; }
    </style>
</head>
<body>

<div id="bg-layer"></div>
<canvas id="live2d-canvas"></canvas>

<div class="loading-tip" id="loadingTip">
    正在加载梅露露……<br>
    <span style="font-size:12px;opacity:0.6">第一次加载可能需要一点时间</span>
</div>

<div class="status-bar">
    <div class="affection-badge" id="affectionBadge">♡ 0</div>
    <div class="mood-badge" id="moodBadge">😶 平静</div>
    <div class="weather-badge" id="weatherBadge">🌡 获取中...</div>
</div>

<div class="top-buttons">
    <button onclick="openHistory()" title="历史对话">💬</button>
    <button onclick="openSettings()" title="设置">⚙</button>
</div>

<div class="speech-bubble" id="speechBubble"></div>

<div class="input-bar hidden" id="inputBar">
    <input type="text" id="messageInput" placeholder="和梅露露说话..." onkeypress="if(event.key==='Enter')sendMessage()">
    <button class="send" onclick="sendMessage()">➤</button>
</div>

<button class="toggle-input-btn" id="toggleInputBtn" onclick="toggleInput()">💬</button>

<div class="overlay" id="historyOverlay">
    <div class="panel">
        <h2><span>💬 历史对话</span><span class="close-x" onclick="closeHistory()">✕</span></h2>
        <div class="history-list" id="historyList"></div>
    </div>
</div>

<div class="overlay" id="settingsOverlay">
    <div class="panel">
        <h2><span>⚙ 设置</span><span class="close-x" onclick="closeSettings()">✕</span></h2>
        <h3>API 配置</h3>
        <label>API 地址</label>
        <input type="text" id="setApiUrl" placeholder="https://xxx.com/v1">
        <label>API Key</label>
        <input type="password" id="setApiKey" placeholder="sk-xxx">
        <label>模型名称</label>
        <input type="text" id="setModel" placeholder="gpt-4o-mini">
        <button class="btn-test" onclick="testConnection()"><span class="status-dot" id="apiStatusDot"></span>测试连接</button>
        <h3>Live2D 模型</h3>
        <label>模型地址（model3.json 的网址）</label>
        <input type="text" id="setLive2dUrl" placeholder="https://...model3.json">
        <button class="btn-test" onclick="reloadModel()"><span class="status-dot" id="modelStatusDot"></span>重新加载模型</button>
        <h3>行为设置</h3>
        <label>主动说话间隔（分钟，0=关闭）</label>
        <input type="number" id="setGreetInterval" value="5">
        <label>闲置动作间隔（秒，0=关闭）</label>
        <input type="number" id="setIdleInterval" value="8">
        <h3>模型显示调整</h3>
        <label>大小（缩放，默认 0.15）</label>
        <input type="number" id="setModelScale" step="0.01" value="0.15">
        <label>水平位置（0=最左，1=最右，默认 0.3）</label>
        <input type="number" id="setModelX" step="0.05" value="0.3">
        <label>垂直位置（0=顶部，1=底部，默认 0.55）</label>
        <input type="number" id="setModelY" step="0.05" value="0.55">
        <div class="btn-row">
            <button class="btn-cancel" onclick="closeSettings()">取消</button>
            <button class="btn-save" onclick="saveSettings()">保存</button>
        </div>
        <button class="btn-danger" onclick="clearAllData()">🗑 清除所有数据</button>
    </div>
</div>

<script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.2/dist/browser/pixi.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>
<script>
// ==================== 数据存储系统 ====================

const STORE = {
    settings: 'meruru_settings',
    history: 'meruru_history',
    affection: 'meruru_affection',
    mood: 'meruru_mood'
};

const DEFAULT_MODEL_URL = 'https://raw.githubusercontent.com/oox5185-hash/meruru/main/Meruru%20-%20Model%20-%20Mark.model3.json';

function _du() {
    try { return atob('aHR0cHM6Ly9uZXdhcGkuYmFpcWkueHl6L3Yx'); } catch(e) { return ''; }
}
function _dk() {
    try { return atob('c2stOFZuOU5hOE9TYnhIZlVTOHdxN20wZUtZWU9vdHVQbjJyUFJkQ2Jlbjl0N1doUDdC'); } catch(e) { return ''; }
}

const DEFAULT_SETTINGS = {
    apiUrl: _du(),
    apiKey: _dk(),
    model: 'grok-4.3-high',
    live2dUrl: DEFAULT_MODEL_URL,
    greetInterval: 5,
    idleInterval: 8,
    modelScale: 0.15,
    modelX: 0.3,
    modelY: 0.55
};

function getSettings() {
    try {
        const data = localStorage.getItem(STORE.settings);
        if (data) return Object.assign({}, DEFAULT_SETTINGS, JSON.parse(data));
    } catch(e) {}
    return Object.assign({}, DEFAULT_SETTINGS);
}

function saveSettingsData(s) {
    localStorage.setItem(STORE.settings, JSON.stringify(s));
}

function getHistory() {
    try {
        const data = localStorage.getItem(STORE.history);
        return data ? JSON.parse(data) : [];
    } catch(e) { return []; }
}

function saveHistory(history) {
    localStorage.setItem(STORE.history, JSON.stringify(history.slice(-50)));
}

function pushHistory(role, content) {
    const h = getHistory();
    h.push({ role, content, time: Date.now() });
    saveHistory(h);
}

function getAffection() {
    return parseInt(localStorage.getItem(STORE.affection) || '0');
}

function saveAffection(v) {
    localStorage.setItem(STORE.affection, String(Math.max(0, Math.min(999, v))));
}

function addAffection(amount) {
    saveAffection(getAffection() + amount);
    updateAffectionBadge();
}

function updateAffectionBadge() {
    const badge = document.getElementById('affectionBadge');
    const a = getAffection();
    let hearts = '♡';
    if (a >= 100) hearts = '♥♥♥';
    else if (a >= 60) hearts = '♥♥';
    else if (a >= 30) hearts = '♥';
    badge.textContent = hearts + ' ' + a;
}
</script>

<script>
// ==================== 心情系统 ====================

let currentMood = 50;
let moodDecayTimer = null;

function getMoodInfo(mood) {
    if (mood >= 80) return { emoji: '😊', name: '很开心', emotion: 'happy' };
    if (mood >= 65) return { emoji: '🙂', name: '愉快', emotion: 'happy' };
    if (mood >= 55) return { emoji: '😌', name: '平静', emotion: 'neutral' };
    if (mood >= 45) return { emoji: '😶', name: '一般', emotion: 'neutral' };
    if (mood >= 35) return { emoji: '😟', name: '有点低落', emotion: 'worry' };
    if (mood >= 20) return { emoji: '😢', name: '难过', emotion: 'cry' };
    return { emoji: '😭', name: '很难过', emotion: 'cry' };
}

function updateMoodBadge() {
    const badge = document.getElementById('moodBadge');
    const info = getMoodInfo(currentMood);
    badge.textContent = info.emoji + ' ' + info.name + ' (' + Math.round(currentMood) + ')';
}

function changeMood(delta) {
    currentMood = Math.max(0, Math.min(100, currentMood + delta));
    updateMoodBadge();
    saveMoodData();
    if (currentEmotion === 'neutral') {
        const info = getMoodInfo(currentMood);
        currentEmotion = info.emotion;
    }
}

function saveMoodData() {
    localStorage.setItem(STORE.mood, JSON.stringify({
        value: currentMood,
        time: Date.now()
    }));
}

function loadMoodData() {
    try {
        const data = JSON.parse(localStorage.getItem(STORE.mood));
        if (data && data.value !== undefined) {
            currentMood = data.value;
            const hours = (Date.now() - data.time) / (1000 * 60 * 60);
            if (hours > 2) {
                currentMood = currentMood + (50 - currentMood) * Math.min(hours / 10, 0.8);
            }
        }
    } catch(e) {
        currentMood = 50;
    }
    updateMoodBadge();
}

function startMoodDecay() {
    moodDecayTimer = setInterval(function() {
        const drift = (Math.random() - 0.55) * 5;
        const regression = (50 - currentMood) * 0.02;
        currentMood = Math.max(0, Math.min(100, currentMood + drift + regression));
        updateMoodBadge();
        saveMoodData();
    }, 30000);
}

function applyTimeMoodEffect() {
    const hour = new Date().getHours();
    if (hour >= 1 && hour < 5) changeMood(-3);
    else if (hour >= 6 && hour < 9) changeMood(+2);
    else if (hour >= 22) changeMood(-2);
}
</script>

<script>
// ==================== Live2D 加载 ====================

let live2dApp = null;
let live2dModel = null;
let currentEmotion = 'neutral';

async function initLive2D() {
    const settings = getSettings();

    if (typeof PIXI === 'undefined' || !PIXI.live2d) {
        showLoadingTip('Live2D引擎加载失败……<br><span style="font-size:12px">请检查网络后刷新页面</span>');
        return;
    }

    try {
        const canvas = document.getElementById('live2d-canvas');
        const dpr = window.devicePixelRatio || 1;
        const width = window.innerWidth;
        const height = window.innerHeight;

        canvas.width = width * dpr;
        canvas.height = height * dpr;
        canvas.style.width = width + 'px';
        canvas.style.height = height + 'px';

        live2dApp = new PIXI.Application({
            view: canvas,
            autoStart: true,
            width: width * dpr,
            height: height * dpr,
            backgroundAlpha: 0,
            resolution: dpr,
            autoDensity: true
        });

        live2dApp.renderer.resize(width, height);
        await loadModel(settings.live2dUrl);
    } catch(e) {
        console.error('Live2D init failed:', e);
        showLoadingTip('加载出错……<br><span style="font-size:12px">' + e.message + '</span>');
    }
}

async function loadModel(url) {
    if (!url) { showLoadingTip('没有设置模型地址'); return; }

    showLoadingTip('正在加载梅露露……');
    document.getElementById('live2d-canvas').classList.remove('ready');

    try {
        if (live2dModel) {
            live2dApp.stage.removeChild(live2dModel);
            live2dModel.destroy();
            live2dModel = null;
        }

        live2dModel = await PIXI.live2d.Live2DModel.from(url, { autoInteract: false });

        live2dModel.visible = false;
        live2dApp.stage.addChild(live2dModel);
        positionModel();

        live2dModel.interactive = true;
        live2dModel.on('pointerdown', function(e) { onModelTap(e); });

        try { live2dModel.internalModel.motionManager.stopAllMotions(); } catch(e2) {}
        try { live2dModel.internalModel.motionManager.expressionManager = null; } catch(e2) {}

        forceInitParams();
        await waitFrames(3);

        live2dModel.visible = true;
        document.getElementById('live2d-canvas').classList.add('ready');
        hideLoadingTip();
        setModelStatus(true);
        startAutoAnimation();

    } catch(e) {
        console.error('Model load failed:', e);
        showLoadingTip('模型加载失败……<br><span style="font-size:12px">' + (e.message || '请检查模型地址和网络') + '</span>');
        setModelStatus(false);
    }
}

function forceInitParams() {
    if (!live2dModel || !live2dModel.internalModel) return;
    const model = live2dModel.internalModel.coreModel;
    for (let i = 3; i <= 32; i++) setParam(model, 'Param' + i, 0);
    setParam(model, 'ParamCheek', 0);
    setParam(model, 'ParamEyeLOpen', 1);
    setParam(model, 'ParamEyeROpen', 1);
    setParam(model, 'ParamEyeLSmile', 0);
    setParam(model, 'ParamEyeRSmile', 0);
    setParam(model, 'ParamBrowLY', 0);
    setParam(model, 'ParamBrowRY', 0);
    setParam(model, 'ParamMouthForm', 0);
    setParam(model, 'ParamMouthOpenY', 0);
    setParam(model, 'ParamAngleX', 0);
    setParam(model, 'ParamAngleY', 0);
    setParam(model, 'ParamAngleZ', 0);
    setParam(model, 'ParamBodyAngleX', 0);
    setParam(model, 'ParamBodyAngleY', 0);
    setParam(model, 'ParamBreath', 0.5);
}

function waitFrames(n) {
    return new Promise(function(resolve) {
        let count = 0;
        function tick() {
            count++;
            if (count >= n) resolve();
            else requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
    });
}

function positionModel() {
    if (!live2dModel) return;
    const settings = getSettings();
    const scale = parseFloat(settings.modelScale) || 0.15;
    const xRatio = parseFloat(settings.modelX) || 0.3;
    const yRatio = parseFloat(settings.modelY) || 0.55;
    live2dModel.scale.set(scale);
    live2dModel.anchor.set(0.5, 0.5);
    live2dModel.x = window.innerWidth * xRatio;
    live2dModel.y = window.innerHeight * yRatio;
}

function setEmotion(emotion) {
    if (!live2dModel) return;
    currentEmotion = emotion || 'neutral';
}

function playIdleMotion() { return; }

function setModelStatus(ok) {
    const dot = document.getElementById('modelStatusDot');
    if (dot) dot.className = 'status-dot ' + (ok ? 'ok' : 'err');
}

function showLoadingTip(html) {
    const tip = document.getElementById('loadingTip');
    if (tip) { tip.innerHTML = html; tip.classList.remove('hidden'); }
}

function hideLoadingTip() {
    const tip = document.getElementById('loadingTip');
    if (tip) tip.classList.add('hidden');
}

window.addEventListener('resize', function() {
    if (live2dApp) live2dApp.renderer.resize(window.innerWidth, window.innerHeight);
    positionModel();
});
</script>

<script>
// ==================== 自动动作系统 ====================

let animationFrameId = null;
let autoAnimStartTime = Date.now();

const autoAnim = {
    breathPhase: 0,
    blinkTimer: 0,
    blinkState: 1,
    nextBlinkTime: 3000,
    headX: 0, headY: 0,
    headTargetX: 0, headTargetY: 0,
    bodyX: 0, bodyTargetX: 0,
    eyeBallX: 0, eyeBallY: 0,
    eyeTargetX: 0, eyeTargetY: 0,
    armValue: 0, armTarget: 0,
    lastHeadChangeTime: 0,
    lastEyeChangeTime: 0,
    lastArmChangeTime: 0,
    isTalking: false,
    talkPhase: 0
};

function startAutoAnimation() {
    if (animationFrameId) cancelAnimationFrame(animationFrameId);
    autoAnimStartTime = Date.now();
    autoAnim.nextBlinkTime = 2000 + Math.random() * 4000;
    animateLoop();
}

function animateLoop() {
    animationFrameId = requestAnimationFrame(animateLoop);
    if (!live2dModel || !live2dModel.internalModel) return;

    const now = Date.now();
    const elapsed = now - autoAnimStartTime;
    const dt = 16;
    const model = live2dModel.internalModel.coreModel;

    autoAnim.breathPhase += 0.02;
    const breathValue = (Math.sin(autoAnim.breathPhase) + 1) * 0.5;
    setParam(model, 'ParamBreath', breathValue);

    autoAnim.blinkTimer += dt;
    if (autoAnim.blinkState === 1 && autoAnim.blinkTimer > autoAnim.nextBlinkTime) {
        autoAnim.blinkState = 0;
        autoAnim.blinkTimer = 0;
    } else if (autoAnim.blinkState === 0 && autoAnim.blinkTimer > 120) {
        autoAnim.blinkState = 1;
        autoAnim.blinkTimer = 0;
        autoAnim.nextBlinkTime = 2000 + Math.random() * 5000;
        if (Math.random() < 0.15) autoAnim.nextBlinkTime = 200;
    }
    let eyeOpenValue = autoAnim.blinkState === 1 ? 1 : 0;

    if (now - autoAnim.lastHeadChangeTime > 4000 + Math.random() * 3000) {
        autoAnim.headTargetX = (Math.random() - 0.5) * 40;
        autoAnim.headTargetY = (Math.random() - 0.5) * 30;
        autoAnim.bodyTargetX = autoAnim.headTargetX * 0.3;
        autoAnim.lastHeadChangeTime = now;
    }
    autoAnim.headX += (autoAnim.headTargetX - autoAnim.headX) * 0.015;
    autoAnim.headY += (autoAnim.headTargetY - autoAnim.headY) * 0.015;
    autoAnim.bodyX += (autoAnim.bodyTargetX - autoAnim.bodyX) * 0.01;

    setParam(model, 'ParamAngleX', autoAnim.headX);
    setParam(model, 'ParamAngleY', autoAnim.headY);
    setParam(model, 'ParamAngleZ', Math.sin(elapsed / 5000) * 3);
    setParam(model, 'ParamBodyAngleX', autoAnim.bodyX);
    setParam(model, 'ParamBodyAngleY', Math.sin(elapsed / 7000) * 2);

    if (now - autoAnim.lastEyeChangeTime > 2500 + Math.random() * 3000) {
        autoAnim.eyeTargetX = (Math.random() - 0.5) * 1.5;
        autoAnim.eyeTargetY = (Math.random() - 0.5) * 1.5;
        autoAnim.lastEyeChangeTime = now;
    }
    autoAnim.eyeBallX += (autoAnim.eyeTargetX - autoAnim.eyeBallX) * 0.03;
    autoAnim.eyeBallY += (autoAnim.eyeTargetY - autoAnim.eyeBallY) * 0.03;
    setParam(model, 'ParamEyeBallX', autoAnim.eyeBallX);
    setParam(model, 'ParamEyeBallY', autoAnim.eyeBallY);

    const hairSwing = Math.sin(elapsed / 2000) * 0.3 + Math.sin(elapsed / 3500) * 0.2;
    setParam(model, 'ParamHairFront', hairSwing);
    setParam(model, 'ParamHairFront2', hairSwing * 0.8);
    setParam(model, 'ParamHairSide', Math.sin(elapsed / 2500) * 0.4);
    setParam(model, 'ParamHairSide2', Math.sin(elapsed / 3000) * 0.3);
    setParam(model, 'ParamHairBack', Math.sin(elapsed / 2800) * 0.3);
    setParam(model, 'ParamHairBack2', Math.sin(elapsed / 3200) * 0.25);

    if (now - autoAnim.lastArmChangeTime > 8000 + Math.random() * 12000) {
        autoAnim.armTarget = Math.random() < 0.3 ? 1 : 0;
        autoAnim.lastArmChangeTime = now;
    }
    autoAnim.armValue += (autoAnim.armTarget - autoAnim.armValue) * 0.02;

    let mouthOpenValue = breathValue * 0.05;
    if (autoAnim.isTalking) {
        autoAnim.talkPhase += 0.3;
        mouthOpenValue = (Math.sin(autoAnim.talkPhase) + 1) * 0.35;
    }

    for (let i = 3; i <= 32; i++) setParam(model, 'Param' + i, 0);
    setParam(model, 'ParamCheek', 0);

    let smileValue = 0;
    let browValue = 0;
    let mouthFormValue = 0;
    let cheekValue = 0;

    if (currentMood >= 65) {
        smileValue = 0.4;
        mouthFormValue = 0.3;
    } else if (currentMood <= 35) {
        browValue = -0.3;
        mouthFormValue = -0.2;
    }

    if (currentEmotion === 'shy') {
        setParam(model, 'Param6', 1);
        cheekValue = 1;
        smileValue = 0.2;
    } else if (currentEmotion === 'cry') {
        setParam(model, 'Param8', 1);
        browValue = -0.5;
        mouthFormValue = -0.3;
    } else if (currentEmotion === 'worry') {
        setParam(model, 'Param5', 1);
        setParam(model, 'ParamBrowLAngle', -0.4);
        setParam(model, 'ParamBrowRAngle', -0.4);
    } else if (currentEmotion === 'sleepy') {
        eyeOpenValue = autoAnim.blinkState === 1 ? 0.3 : 0;
        setParam(model, 'Param31', 1);
    } else if (currentEmotion === 'happy') {
        smileValue = 0.7;
        mouthFormValue = 0.5;
        cheekValue = 0.5;
    } else if (currentEmotion === 'angry') {
        setParam(model, 'ParamBrowLAngle', 0.6);
        setParam(model, 'ParamBrowRAngle', 0.6);
        browValue = 0.3;
        mouthFormValue = -0.3;
    }

    setParam(model, 'ParamEyeLOpen', eyeOpenValue);
    setParam(model, 'ParamEyeROpen', eyeOpenValue);
    setParam(model, 'ParamEyeLSmile', smileValue);
    setParam(model, 'ParamEyeRSmile', smileValue);
    setParam(model, 'ParamBrowLY', browValue);
    setParam(model, 'ParamBrowRY', browValue);
    setParam(model, 'ParamMouthForm', mouthFormValue);
    setParam(model, 'ParamMouthOpenY', mouthOpenValue);
    setParam(model, 'ParamCheek', cheekValue);
    setParam(model, 'Param21', autoAnim.armValue);
}

function setParam(coreModel, paramId, value) {
    try {
        const index = coreModel._parameterIds.indexOf(paramId);
        if (index >= 0) coreModel._parameterValues[index] = value;
    } catch(e) {}
}

function startTalking() {
    autoAnim.isTalking = true;
    autoAnim.talkPhase = 0;
}

function stopTalking() {
    autoAnim.isTalking = false;
}
</script>
<script>
// ==================== 天气系统 ====================

let weatherData = {
    city: '未知',
    temp: '--',
    condition: '加载中',
    icon: '🌡',
    loaded: false
};

async function fetchWeather() {
    try {
        let lat, lon, city;

        try {
            const ipRes = await fetch('https://ipwho.is/');
            const ipData = await ipRes.json();
            if (ipData.success !== false) {
                city = ipData.city || ipData.region || '未知';
                lat = ipData.latitude;
                lon = ipData.longitude;
            }
        } catch(e1) {}

        if (!lat || !lon) {
            try {
                const ipRes2 = await fetch('https://ipapi.co/json/');
                const ipData2 = await ipRes2.json();
                city = ipData2.city || ipData2.region || '未知';
                lat = ipData2.latitude;
                lon = ipData2.longitude;
            } catch(e2) {}
        }

        if (!lat || !lon) {
            try {
                const ipRes3 = await fetch('https://ip-api.io/json');
                const ipData3 = await ipRes3.json();
                city = ipData3.city || ipData3.region_name || '未知';
                lat = ipData3.latitude;
                lon = ipData3.longitude;
            } catch(e3) {}
        }

        if (!lat || !lon) {
            throw new Error('无法获取位置信息');
        }

        const weatherRes = await fetch(
            'https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lon + '&current=temperature_2m,relative_humidity_2m,weather_code,apparent_temperature,wind_speed_10m'
        );
        const wData = await weatherRes.json();
        const current = wData.current;

        const temp = Math.round(current.temperature_2m);
        const feelsLike = Math.round(current.apparent_temperature);
        const humidity = current.relative_humidity_2m;
        const weatherCode = current.weather_code;

        let desc = '未知';
        let icon = '🌤';
        if (weatherCode === 0) { desc = '晴天'; icon = '☀️'; }
        else if (weatherCode <= 3) { desc = '多云'; icon = '⛅'; }
        else if (weatherCode <= 48) { desc = '雾'; icon = '🌫️'; }
        else if (weatherCode <= 57) { desc = '毛毛雨'; icon = '🌦️'; }
        else if (weatherCode <= 67) { desc = '下雨'; icon = '🌧️'; }
        else if (weatherCode <= 77) { desc = '下雪'; icon = '❄️'; }
        else if (weatherCode <= 82) { desc = '阵雨'; icon = '🌧️'; }
        else if (weatherCode <= 86) { desc = '阵雪'; icon = '❄️'; }
        else if (weatherCode >= 95) { desc = '雷暴'; icon = '⛈️'; }

        weatherData = {
            city: city,
            temp: temp,
            feelsLike: feelsLike,
            humidity: humidity,
            condition: desc,
            icon: icon,
            loaded: true
        };

        updateWeatherBadge();
        applyWeatherMoodEffect();

    } catch(e) {
        console.error('Weather fetch failed:', e);
        weatherData = {
            city: '未知',
            temp: '--',
            condition: '获取失败',
            icon: '❓',
            loaded: false
        };
        updateWeatherBadge();
    }
}

function updateWeatherBadge() {
    const badge = document.getElementById('weatherBadge');
    if (weatherData.loaded) {
        badge.textContent = weatherData.icon + ' ' + weatherData.city + ' ' + weatherData.temp + '°C ' + weatherData.condition;
    } else {
        badge.textContent = weatherData.icon + ' ' + weatherData.condition;
    }
}

function applyWeatherMoodEffect() {
    if (!weatherData.loaded) return;
    const cond = weatherData.condition;
    const temp = parseInt(weatherData.temp);

    if (cond.indexOf('晴') >= 0 && temp >= 15 && temp <= 28) {
        changeMood(+5);
    } else if (cond.indexOf('雨') >= 0) {
        changeMood(-3);
    } else if (cond.indexOf('雪') >= 0) {
        changeMood(+3);
    } else if (temp > 35) {
        changeMood(-4);
    } else if (temp < 0) {
        changeMood(-2);
    } else if (cond.indexOf('雷') >= 0) {
        changeMood(-5);
    }
}

function getWeatherPrompt() {
    if (!weatherData.loaded) return '';
    return '当前天气：' + weatherData.city + '，' + weatherData.temp + '°C，' + weatherData.condition + '。体感温度' + (weatherData.feelsLike || weatherData.temp) + '°C，湿度' + (weatherData.humidity || '未知') + '%。';
}

setInterval(fetchWeather, 30 * 60 * 1000);
</script>

<script>
// ==================== 时间系统 ====================

function getTimePeriod() {
    const hour = new Date().getHours();
    if (hour >= 23 || hour < 1) return { period: '深夜', hint: '很晚了，该休息了', sleepy: true };
    if (hour >= 1 && hour < 6) return { period: '凌晨', hint: '这么早还醒着，很担心', sleepy: true };
    if (hour >= 6 && hour < 8) return { period: '清晨', hint: '早上好', sleepy: false };
    if (hour >= 8 && hour < 11) return { period: '上午', hint: '上午的时光', sleepy: false };
    if (hour >= 11 && hour < 13) return { period: '中午', hint: '午饭时间', sleepy: false };
    if (hour >= 13 && hour < 15) return { period: '午后', hint: '午后容易困', sleepy: false };
    if (hour >= 15 && hour < 18) return { period: '下午', hint: '下午好', sleepy: false };
    if (hour >= 18 && hour < 19) return { period: '傍晚', hint: '傍晚了', sleepy: false };
    if (hour >= 19 && hour < 23) return { period: '晚上', hint: '晚上好', sleepy: false };
    return { period: '未知', hint: '', sleepy: false };
}

function getTimeStr() {
    const now = new Date();
    return now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
}
</script>

    messages.push({ role: 'system', content: buildSystemPrompt() });
    const examples = buildMessageExamples();
    for (let i = 0; i < examples.length; i++) messages.push(examples[i]);

    const history = getHistory().slice(-20);
    for (let j = 0; j < history.length; j++) messages.push({ role: history[j].role, content: history[j].content });
    messages.push({ role: 'user', content: userMessage });

    try {
        let apiUrl = settings.apiUrl;
        if (!apiUrl.endsWith('/chat/completions')) {
            if (apiUrl.endsWith('/')) apiUrl = apiUrl.slice(0, -1);
            if (!apiUrl.endsWith('/v1')) apiUrl += '/v1';
            apiUrl += '/chat/completions';
        }

        const response = await fetch(apiUrl, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + settings.apiKey
            },
            body: JSON.stringify({
                model: settings.model,
                messages: messages,
                temperature: 1.3,
                max_tokens: 300
            })
        });

        if (!response.ok) {
            const errText = await response.text();
            console.error('API Error:', response.status, errText);
            return '[emotion:cry][mood:-2] 呜呜……出错了……对不起，我、我好像暂时无法回应……（错误：' + response.status + '）';
        }

        const data = await response.json();
        const reply = data.choices && data.choices[0] && data.choices[0].message ? data.choices[0].message.content : '';
        if (!reply) {
            return '[emotion:worry][mood:-1] 那、那个……我的脑袋好像转不动了……对不起……';
        }
        return reply;
    } catch(e) {
        console.error('AI request failed:', e);
        return '[emotion:cry][mood:-2] 呜……网络好像出了问题……主人，对不起……我、我连接不上了……';
    }
}

function parseReply(text) {
    let emotion = 'neutral';
    let moodDelta = 0;
    let cleanText = text;

    const emotionReg = /\[emotion:(\w+)\]/;
    const emotionMatch = text.match(emotionReg);
    if (emotionMatch) {
        emotion = emotionMatch[1];
        cleanText = cleanText.replace(emotionReg, '');
    }

    const moodReg = /\[mood:([+-]?\d+)\]/;
    const moodMatch = text.match(moodReg);
    if (moodMatch) {
        moodDelta = parseInt(moodMatch[1]);
        cleanText = cleanText.replace(moodReg, '');
    }

    cleanText = cleanText.trim();
    return { emotion: emotion, moodDelta: moodDelta, text: cleanText };
}
</script>
<script>
// ==================== 气泡显示 ====================

let bubbleTimer = null;

function showSpeech(text, duration) {
    const bubble = document.getElementById('speechBubble');
    bubble.textContent = text;
    bubble.classList.add('show');
    startTalking();

    if (!duration) {
        duration = Math.max(4000, text.length * 200);
    }

    if (bubbleTimer) clearTimeout(bubbleTimer);
    bubbleTimer = setTimeout(function() {
        bubble.classList.remove('show');
        stopTalking();
    }, duration);
}

function hideSpeech() {
    const bubble = document.getElementById('speechBubble');
    bubble.classList.remove('show');
    stopTalking();
    if (bubbleTimer) clearTimeout(bubbleTimer);
}

// ==================== 发送消息 ====================

let isWaitingReply = false;

async function sendMessage() {
    const input = document.getElementById('messageInput');
    const text = input.value.trim();
    if (!text || isWaitingReply) return;

    input.value = '';
    isWaitingReply = true;
    markInteraction();

    pushHistory('user', text);
    showSpeech('……', 60000);

    const rawReply = await callAI(text);
    const parsed = parseReply(rawReply);

    showSpeech(parsed.text);
    setEmotion(parsed.emotion);

    if (parsed.moodDelta !== 0) changeMood(parsed.moodDelta);

    if (parsed.emotion === 'happy' || parsed.emotion === 'shy') {
        addAffection(2);
    } else if (parsed.emotion === 'neutral') {
        addAffection(1);
    } else if (parsed.emotion === 'angry') {
        addAffection(-1);
    }

    pushHistory('assistant', rawReply);
    isWaitingReply = false;
}

// ==================== 点击模型互动 ====================

let tapCount = 0;
let tapTimer = null;
let recentTapTimes = [];

function onModelTap(e) {
    markInteraction();
    tapCount++;
    recentTapTimes.push(Date.now());
    recentTapTimes = recentTapTimes.filter(function(t) { return Date.now() - t < 60000; });

    if (tapTimer) clearTimeout(tapTimer);
    tapTimer = setTimeout(async function() {
        const count = tapCount;
        tapCount = 0;
        await handleTap(count);
    }, 500);
}

async function handleTap(count) {
    if (isWaitingReply) return;
    isWaitingReply = true;

    const isAnnoyed = recentTapTimes.length > 8;
    const isMoody = currentMood < 35;
    const randomAnnoyed = Math.random() < 0.12;

    let prompt = '';
    let affectionChange = 0;

    if (isAnnoyed || (isMoody && count >= 2)) {
        prompt = '（主人一直不停地戳你，你感到有点烦躁不舒服，想让主人停下来）';
        affectionChange = -2;
        changeMood(-5);
    } else if (isMoody && randomAnnoyed) {
        prompt = '（主人碰了你，但你现在心情不太好，不太想被碰触）';
        affectionChange = -1;
        changeMood(-3);
    } else if (count >= 3) {
        prompt = '（主人连续戳了你好几下，有点痒又有点害羞）';
        affectionChange = 1;
        changeMood(+2);
    } else if (count === 2) {
        prompt = '（主人温柔地摸了摸你的头）';
        affectionChange = 2;
        changeMood(+4);
    } else {
        if (randomAnnoyed) {
            prompt = '（主人突然碰了一下你，你吓了一跳）';
            affectionChange = 0;
            changeMood(-1);
        } else {
            prompt = '（主人轻轻碰了碰你）';
            affectionChange = 1;
            changeMood(+2);
        }
    }

    showSpeech('……', 60000);
    const rawReply = await callAI(prompt);
    const parsed = parseReply(rawReply);

    showSpeech(parsed.text);
    setEmotion(parsed.emotion);
    if (parsed.moodDelta !== 0) changeMood(parsed.moodDelta);
    if (affectionChange !== 0) addAffection(affectionChange);

    pushHistory('user', prompt);
    pushHistory('assistant', rawReply);
    isWaitingReply = false;
}

// ==================== 输入栏切换 ====================

function toggleInput() {
    const bar = document.getElementById('inputBar');
    const btn = document.getElementById('toggleInputBtn');
    bar.classList.toggle('hidden');
    if (bar.classList.contains('hidden')) {
        btn.textContent = '💬';
    } else {
        btn.textContent = '✕';
        document.getElementById('messageInput').focus();
    }
}

<script>
// ==================== 自主行为系统 ====================

let greetingTimer = null;
let idleTimer = null;
let timeMoodTimer = null;
let lastInteractionTime = Date.now();

function markInteraction() {
    lastInteractionTime = Date.now();
}

function initBehaviorTimers() {
    const settings = getSettings();

    if (greetingTimer) clearInterval(greetingTimer);
    if (idleTimer) clearInterval(idleTimer);
    if (timeMoodTimer) clearInterval(timeMoodTimer);

    const greetMin = parseInt(settings.greetInterval);
    if (greetMin > 0) {
        greetingTimer = setInterval(function() {
            triggerAutoSpeak();
        }, greetMin * 60 * 1000);
    }

    const idleSec = parseInt(settings.idleInterval);
    if (idleSec > 0) {
        idleTimer = setInterval(function() {
            triggerIdleAction();
        }, idleSec * 1000);
    }

    timeMoodTimer = setInterval(function() {
        applyTimeMoodEffect();
    }, 10 * 60 * 1000);
}

async function triggerAutoSpeak() {
    if (isWaitingReply) return;
    if (Date.now() - lastInteractionTime < 120000) return;

    const time = getTimePeriod();
    const random = Math.floor(Math.random() * 5);
    let prompt = '';

    if (random === 0) {
        prompt = '（现在是' + time.period + '，时间' + getTimeStr() + '。请根据时间主动和主人说句话或关心一下主人。你主动开口。）';
    } else if (random === 1) {
        if (weatherData.loaded) {
            prompt = '（你看了看窗外的天气，想和主人聊聊。' + getWeatherPrompt() + '请根据天气状况说几句关心的话。）';
        } else {
            prompt = '（你想主动和主人分享一件小事。）';
        }
    } else if (random === 2) {
        const topics = [
            '（你刚照顾完香草植物，想和主人说几句。）',
            '（你突然想到主人，忍不住想说话。）',
            '（你看完了一本书，想和主人分享感想。）',
            '（你做了一个有趣的梦，想和主人说。）',
            '（你发现了一朵很漂亮的花，想告诉主人。）'
        ];
        prompt = topics[Math.floor(Math.random() * topics.length)];
    } else if (random === 3) {
        if (currentMood < 30) {
            prompt = '（你现在心情很低落，想和主人说说心里话，或者只是轻轻叹气。）';
        } else if (currentMood > 70) {
            prompt = '（你现在心情很好，想主动和主人分享你的开心。）';
        } else {
            prompt = '（你想确认主人还在，轻轻叫了一声。）';
        }
    } else {
        const hour = new Date().getHours();
        if (hour >= 23 || hour < 5) {
            prompt = '（已经很晚了，你担心主人还没睡，想催主人休息。）';
        } else if (hour >= 11 && hour < 13) {
            prompt = '（午饭时间，你想提醒主人吃饭。）';
        } else if (hour >= 17 && hour < 19) {
            prompt = '（傍晚了，你想提醒主人吃晚饭。）';
        } else {
            prompt = '（你想提醒主人注意休息，喝点水。）';
        }
    }

    isWaitingReply = true;
    const rawReply = await callAI(prompt);
    const parsed = parseReply(rawReply);

    showSpeech(parsed.text);
    setEmotion(parsed.emotion);
    if (parsed.moodDelta !== 0) changeMood(parsed.moodDelta);
    pushHistory('assistant', rawReply);
    isWaitingReply = false;
}

function triggerIdleAction() {
    if (isWaitingReply) return;
    if (!live2dModel) return;
    if (Date.now() - lastInteractionTime < 15000) return;

    const random = Math.random();

    if (random < 0.15) {
        const time = getTimePeriod();
        if (time.sleepy || currentMood < 40) {
            setEmotion('sleepy');
            triggerYawn();
            setTimeout(function() {
                const info = getMoodInfo(currentMood);
                setEmotion(info.emotion);
            }, 3000);
        }
    } else if (random < 0.3) {
        triggerLookAround();
    } else if (random < 0.45) {
        if (currentMood > 50) {
            setEmotion('shy');
            setTimeout(function() {
                const info = getMoodInfo(currentMood);
                setEmotion(info.emotion);
            }, 2500);
        }
    } else if (random < 0.6) {
        const drift = (Math.random() - 0.5) * 4;
        changeMood(drift);
    } else if (random < 0.75) {
        triggerStretch();
    } else if (random < 0.85) {
        if (currentMood < 45) {
            triggerSigh();
        }
    } else {
        triggerLookAround();
    }
}

function triggerYawn() {
    if (!live2dModel || !live2dModel.internalModel) return;
    const model = live2dModel.internalModel.coreModel;
    let phase = 0;
    const yawnAnim = setInterval(function() {
        phase += 0.05;
        if (phase > Math.PI) {
            clearInterval(yawnAnim);
            return;
        }
        const val = Math.sin(phase);
        setParam(model, 'ParamMouthOpenY', val * 0.8);
    }, 50);
}

function triggerLookAround() {
    autoAnim.eyeTargetX = (Math.random() - 0.5) * 2;
    autoAnim.eyeTargetY = (Math.random() - 0.5) * 1.5;
    autoAnim.lastEyeChangeTime = Date.now();
    autoAnim.headTargetX = autoAnim.eyeTargetX * 15;
    autoAnim.headTargetY = autoAnim.eyeTargetY * 10;
    autoAnim.lastHeadChangeTime = Date.now();
}

function triggerStretch() {
    autoAnim.armTarget = 1;
    autoAnim.lastArmChangeTime = Date.now() + 5000;
    setTimeout(function() { autoAnim.armTarget = 0; }, 3000);
}

function triggerSigh() {
    if (!live2dModel || !live2dModel.internalModel) return;
    const model = live2dModel.internalModel.coreModel;
    autoAnim.headTargetY = -10;
    autoAnim.lastHeadChangeTime = Date.now();
    let phase = 0;
    const sighAnim = setInterval(function() {
        phase += 0.03;
        if (phase > Math.PI) {
            clearInterval(sighAnim);
            return;
        }
        setParam(model, 'ParamMouthOpenY', Math.sin(phase) * 0.3);
    }, 50);
}
</script>

<script>
// ==================== 设置界面 ====================

function openSettings() {
    const s = getSettings();
    document.getElementById('setApiUrl').value = s.apiUrl || '';
    document.getElementById('setApiKey').value = s.apiKey || '';
    document.getElementById('setModel').value = s.model || '';
    document.getElementById('setLive2dUrl').value = s.live2dUrl || '';
    document.getElementById('setGreetInterval').value = s.greetInterval;
    document.getElementById('setIdleInterval').value = s.idleInterval;
    document.getElementById('setModelScale').value = s.modelScale;
    document.getElementById('setModelX').value = s.modelX;
    document.getElementById('setModelY').value = s.modelY;
    document.getElementById('settingsOverlay').classList.add('show');
}

function closeSettings() {
    document.getElementById('settingsOverlay').classList.remove('show');
}

function saveSettings() {
    const s = getSettings();
    s.apiUrl = document.getElementById('setApiUrl').value.trim();
    s.apiKey = document.getElementById('setApiKey').value.trim();
    s.model = document.getElementById('setModel').value.trim();
    s.live2dUrl = document.getElementById('setLive2dUrl').value.trim();
    s.greetInterval = parseInt(document.getElementById('setGreetInterval').value) || 0;
    s.idleInterval = parseInt(document.getElementById('setIdleInterval').value) || 0;
    s.modelScale = parseFloat(document.getElementById('setModelScale').value) || 0.15;
    s.modelX = parseFloat(document.getElementById('setModelX').value);
    s.modelY = parseFloat(document.getElementById('setModelY').value);
    if (isNaN(s.modelX)) s.modelX = 0.3;
    if (isNaN(s.modelY)) s.modelY = 0.55;

    saveSettingsData(s);
    closeSettings();
    positionModel();
    initBehaviorTimers();
    alert('设置已保存！');
}

async function testConnection() {
    const dot = document.getElementById('apiStatusDot');
    dot.className = 'status-dot';

    const apiUrl = document.getElementById('setApiUrl').value.trim();
    const apiKey = document.getElementById('setApiKey').value.trim();

    if (!apiUrl || !apiKey) {
        alert('请先填写API地址和Key');
        dot.className = 'status-dot err';
        return;
    }

    try {
        let modelsUrl = apiUrl;
        if (modelsUrl.endsWith('/chat/completions')) {
            modelsUrl = modelsUrl.replace('/chat/completions', '');
        }
        if (modelsUrl.endsWith('/')) modelsUrl = modelsUrl.slice(0, -1);
        if (!modelsUrl.endsWith('/v1')) modelsUrl += '/v1';
        modelsUrl += '/models';

        const response = await fetch(modelsUrl, {
            method: 'GET',
            headers: { 'Authorization': 'Bearer ' + apiKey }
        });

        if (!response.ok) throw new Error('状态码：' + response.status);

        const data = await response.json();
        const models = data.data || data.models || [];

        if (models.length === 0) {
            alert('连接成功，但没找到可用模型');
            dot.className = 'status-dot ok';
            return;
        }

        dot.className = 'status-dot ok';
        showModelPicker(models.map(function(m) { return m.id || m.name || m; }));
    } catch(e) {
        dot.className = 'status-dot err';
        alert('获取模型列表失败：' + e.message);
    }
}

function showModelPicker(modelIds) {
    const old = document.getElementById('modelPickerOverlay');
    if (old) old.remove();

    const overlay = document.createElement('div');
    overlay.id = 'modelPickerOverlay';
    overlay.className = 'overlay show';
    overlay.style.zIndex = '60';

    const panel = document.createElement('div');
    panel.className = 'panel';

    const title = document.createElement('h2');
    title.innerHTML = '<span>选择模型 (' + modelIds.length + ')</span><span class="close-x">✕</span>';
    title.querySelector('.close-x').onclick = function() { overlay.remove(); };
    panel.appendChild(title);

    const tip = document.createElement('div');
    tip.style.cssText = 'color:rgba(255,255,255,0.5);font-size:12px;margin-bottom:10px';
    tip.textContent = '点击任意模型名，自动填入设置';
    panel.appendChild(tip);

    const list = document.createElement('div');
    list.className = 'history-list';

    modelIds.forEach(function(id) {
        const item = document.createElement('div');
        item.className = 'history-item meruru';
        item.style.cursor = 'pointer';
        item.textContent = id;
        item.onclick = function() {
            document.getElementById('setModel').value = id;
            overlay.remove();
            alert('已选择模型：' + id);
        };
        list.appendChild(item);
    });

    panel.appendChild(list);
    overlay.appendChild(panel);
    document.body.appendChild(overlay);
}

async function reloadModel() {
    const url = document.getElementById('setLive2dUrl').value.trim();
    const s = getSettings();
    s.live2dUrl = url;
    saveSettingsData(s);
    await loadModel(url);
}

// ==================== 历史界面 ====================

function openHistory() {
    const list = document.getElementById('historyList');
    list.innerHTML = '';

    const history = getHistory();
    if (history.length === 0) {
        list.innerHTML = '<div style="color:rgba(255,255,255,0.4);text-align:center;padding:20px">还没有对话记录……</div>';
    } else {
        history.forEach(function(msg) {
            const item = document.createElement('div');
            if (msg.role === 'user') {
                item.className = 'history-item user';
                item.innerHTML = '<div class="who">主人</div>' + escapeHtml(msg.content);
            } else {
                item.className = 'history-item meruru';
                const parsed = parseReply(msg.content);
                item.innerHTML = '<div class="who">梅露露</div>' + escapeHtml(parsed.text);
            }
            list.appendChild(item);
        });
    }

    document.getElementById('historyOverlay').classList.add('show');
    setTimeout(function() { list.scrollTop = list.scrollHeight; }, 50);
}

function closeHistory() {
    document.getElementById('historyOverlay').classList.remove('show');
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function clearAllData() {
    if (confirm('确定清除所有数据吗？（聊天记录、好感度、心情、设置都会删除）')) {
        localStorage.removeItem(STORE.settings);
        localStorage.removeItem(STORE.history);
        localStorage.removeItem(STORE.affection);
        localStorage.removeItem(STORE.mood);
        location.reload();
    }
}
</script>
